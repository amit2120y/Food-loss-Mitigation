<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Food | Annasetu</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/addFood.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo">🌾 Annasetu</h2>

            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="addfood.html" class="nav-link active">Add Food</a>
            <a href="#" class="nav-link">Notifications</a>
            <a href="#" class="nav-link">Profile</a>
            <a href="index.html" class="nav-link logout"
                onclick="localStorage.removeItem('token');localStorage.removeItem('user');">Logout</a>
        </div>

        <!-- MAIN -->
        <div class="main-content">

            <div class="header">
                <h2 class="title">Donate Food</h2>
                <button onclick="location.href='dashboard.html'" class="btn">Back</button>
            </div>

            <div class="card">

                <form id="foodForm">

                    <div class="form-grid">

                        <input type="text" id="foodName" placeholder="Food Name" required>
                        <input type="text" id="quantity" placeholder="Quantity" required>

                        <input type="datetime-local" id="cookedTime" required>

                        <select id="foodType" required>
                            <option value="">Food Type</option>
                            <option>Vegetarian</option>
                            <option>Non-Veg</option>
                            <option>Vegan</option>
                        </select>

                    </div>

                    <!-- FULL WIDTH -->
                    <div class="form-grid">

                        <textarea id="description" placeholder="Description..."></textarea>
                        <input type="text" id="location" placeholder="Pickup Location" required>

                    </div>

                    <!-- IMAGE -->
                    <div class="upload-box" id="uploadBox">
                        <i class="fa fa-cloud-upload-alt"></i>
                        <p>Upload 2–4 Photos</p>
                        <input type="file" id="imageUpload" multiple accept="image/*">
                    </div>

                    <div id="imageMsg"></div>

                    <div class="preview" id="preview"></div>

                    <button type="submit" class="btn-primary">Donate Food</button>

                </form>

            </div>

        </div>
    </div>

    <script>

        const upload = document.getElementById("imageUpload");
        const preview = document.getElementById("preview");
        const msg = document.getElementById("imageMsg");
        const form = document.getElementById("foodForm");
        const donateBtn = form.querySelector('.btn-primary');

        // shared images array accessible to submit handler
        let imagesData = [];

        document.getElementById("uploadBox").onclick = () => upload.click();
        // Prevent clicks on the native file input from bubbling up to the upload box
        upload.addEventListener('click', (e) => e.stopPropagation());

        // helper to read files as data URLs, returns Promise<string[]>
        const readFilesAsDataURLs = (files) => {
            const readers = Array.from(files).map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsDataURL(file);
                });
            });
            return Promise.all(readers);
        };

        upload.addEventListener("change", async () => {

            preview.innerHTML = "";
            const files = upload.files;

            imagesData = []; // reset

            if (files.length < 2) {
                msg.innerHTML = "❌ Minimum 2 images required";
                return;
            }

            if (files.length > 4) {
                msg.innerHTML = "❌ Maximum 4 images allowed";
                upload.value = "";
                return;
            }

            msg.innerHTML = "✅ Images selected";

            try {
                // read all files and render previews
                imagesData = await readFilesAsDataURLs(files);
                imagesData.forEach(src => {
                    const img = document.createElement("img");
                    img.src = src;
                    img.classList.add("preview-img");
                    preview.appendChild(img);
                });
            } catch (err) {
                console.error('Failed to read images', err);
                msg.innerHTML = '❌ Failed to read images';
            }

        });

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const files = upload.files;
            if (files.length < 2 || files.length > 4) {
                alert("Upload 2–4 images");
                return;
            }

            // ensure imagesData is populated (in case user submitted before change handler finished)
            if (imagesData.length !== files.length) {
                try {
                    donateBtn.disabled = true;
                    donateBtn.textContent = 'Processing...';
                    imagesData = await readFilesAsDataURLs(files);
                } catch (err) {
                    donateBtn.disabled = false;
                    donateBtn.textContent = 'Donate Food';
                    alert('Failed to read images');
                    return;
                }
            }

            // gather form values
            const foodName = document.getElementById('foodName').value || 'Unnamed';
            const quantity = document.getElementById('quantity').value || '';
            const cookedTime = document.getElementById('cookedTime').value || '';
            const foodType = document.getElementById('foodType').value || '';
            const description = document.getElementById('description').value || '';
            const location = document.getElementById('location').value || '';

            const donation = {
                id: 'd_' + Date.now(),
                food: foodName,
                qty: quantity,
                cookedTime,
                type: foodType,
                description,
                location,
                images: imagesData.slice(),
                status: 'Available',
                createdAt: new Date().toISOString()
            };

            // persist to localStorage with user-specific key
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userDonationsKey = `donations_${user.id}`;
            const existing = JSON.parse(localStorage.getItem(userDonationsKey) || '[]');
            existing.unshift(donation);
            localStorage.setItem(userDonationsKey, JSON.stringify(existing));

            // redirect back to dashboard where the donation will be rendered
            window.location.href = "dashboard.html";

        });

    </script>

</body>

</html>
