<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form practice </title>
</head>

<body>
    <h1>University Registration Form </h1>
    <p>Please fill out the form below to register</p>
    <hr>
    <form>
        <h2>Personal Details</h2>

        <label for="fname">First Name: </label>
        <input type="text" id="fname" name="firstname" placeholder="e.g:Arjun" required>

        <br><br>

        <label for="Lname">Last Name:</label>
        <input type="text" id="Lname" name="Lname" placeholder="e.g:Pandey" required>

        <br><br>

        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="dob" required>

        <br><br>

        <h>Gender:</h>
        <br><br>

        <label for="Male">   Male</label>
        <input type="radio" name="gender" id="Male" value="Male" />

        <br><br>

        <label for="Female">   Female</label>
        <input type="radio" name="gender" id="Female" value="Female" />

        <br><br>

        <label for="other">   other</label>
        <input type="radio" name="gender" id="other" value="other">

        <br><br>

        <h3>Choose your photo</h3>

        <input type="file" name="file">
        <hr>

        <h2>Contact information</h2>

        <label for="emailadd">Email address:</label>
        <input type="email" id="emailadd" name="emailaddress" placeholder="you@example.com">

        <br><br>

        <label for="Phone number">Phone number:</label>

        <input type="tel" name="phonenumber" placeholder="eg., 4464467865">

        <br><br>

        <label id="Mailing">Mailing address:</label>

        <br><br>

        <label for="Address">Mailing Address:</label>

        <br>

        <textarea name="Address"id="Address" rows="5" cols="15"></textarea>

        <br><br 

        <hr>

        <h2>Academic Infformation</h2>

        <label for="Course">Select Your Course:</label>
        <select name="Course" id="Course" >
            <option value="CSE">CSE</option>
            <option value="ME">ME</option>
            <option value="ECE">ECE</option>
        </select>

        <br>

        <h3>Extraciricular Intrests:</h3>
        <br>

        <label for="extra"> sports:</label>
        <input type="checkbox" id="extra" value="sports" name="intrests">

        <br><br>

        <label for="musics and arts"> Musics and arts:</label>
        <input type="checkbox" id="musics and arts" value="music and arts" name="intrests">

        <br><br>

        <label for="tech and clubs"> Technology and  clubs:</label>
        <input type="checkbox" id="tech and clubs" value="tech and clubs" name="intrests">

        <br><br>

        <label for="Volunteering"> Volunteering</label>
        <input type="checkbox" id="Volunteering" value="Volunteering" name="intrests">
        

        <h2>Create your account</h2>

        <label for="password">creata a password</label>
        <input type="password" id="passwords" name="password"  >

        <br><br>

        <label for="urgency">Security question:</label>

        <select name="question" id="question">

            <option value="pet">what was your first pet name?</option>

            <option value="school">what was your first school's name?</option>

            <option value="book">what was your favourite book name?</option>
        </select>

        <br><br>
        <label for="answer">Security answer:</label>
        <input type="text" id="answer" name="answer" >
        <br><br>
        <label for="terms">I agree to the terms and conditions.</label>
        <input type="checkbox" name="agree" id="terms">

        <hr>

        <button type="submit">Register</button>
        <button type="reset">clear form</button>
    </form>
</body>
</html>
