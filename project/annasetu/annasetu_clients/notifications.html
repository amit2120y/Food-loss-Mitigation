<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Annasetu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .notifications-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .notifications-header {
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .notifications-header h1 {
            color: #1b5e20;
            margin: 0 0 10px 0;
        }

        .notification-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #2e7d32;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .notification-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .notification-content {
            flex: 1;
        }

        .notification-content h3 {
            margin: 0 0 5px 0;
            color: #333;
            font-size: 16px;
        }

        /* Render the main notification text without heavy bolding */
        .notification-content h4 {
            margin: 0 0 5px 0;
            color: #333;
            font-size: 15px;
            font-weight: 400;
            /* normal weight */
            line-height: 1.2;
        }

        /* Style the close ("x") button on notification cards */
        .notification-close {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #333;
            margin-left: 12px;
            align-self: flex-start;
            /* keep it aligned to the top */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .notification-close:hover {
            background: #fafafa;
            border-color: #cfcfcf;
        }

        .notification-close i {
            font-size: 12px;
            line-height: 1;
        }

        .notification-close:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.04);
        }

        .notification-content p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .notification-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 60px;
            color: #ddd;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state p {
            color: #999;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2 class="logo">अन्न-𝙎𝙚𝙩𝙪</h2>

            <nav>
                <a href="dashboard.html" class="nav-link"><i class="fa fa-home"></i> Dashboard</a>
                <a href="addfood.html" class="nav-link"><i class="fa fa-plus-circle"></i> Add Food</a>
                <a href="browse.html" class="nav-link"><span class="material-symbols-outlined">food_bank</span> Browse
                    Food</a>
                <a href="manage-requests.html" class="nav-link"><i class="fa fa-tasks"></i> Manage Requests</a>
                <a href="myclaims.html" class="nav-link"><i class="fa fa-inbox"></i> My Claims</a>
                <a href="notifications.html" class="nav-link active" id="notificationBellLink">
                    <span style="position:relative;display:inline-block;">
                        <i class="fa fa-bell"></i>
                        <span id="notificationBadge"
                            style="display:none;position:absolute;top:-8px;right:-8px;background:#d32f2f;color:#fff;border-radius:50%;padding:2px 7px;font-size:12px;font-weight:bold;z-index:2;">0</span>
                    </span>
                    Notifications
                </a>
                <a href="profile.html" class="nav-link"><i class="fa fa-user"></i> Profile</a>
                <a href="#" class="nav-link logout">
                    <i class="fa fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="notifications-container">
                <div class="notifications-header">
                    <h1><i class="fas fa-bell"></i> Notifications</h1>
                    <p>You're all caught up!</p>
                </div>

                <div id="notificationsContainer">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No notifications yet</p>
                        <p style="font-size: 13px; margin-top: 10px;">You'll receive notifications here about your
                            donations and requests</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.io client from CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/env.js"></script>
    <script src="js/common-utils.js"></script>
    <script src="js/notifications.js"></script>
</body>

</html>
