<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annasetu Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left-panel">
            <img src="foodimages/main5.jpg" alt="Composting" class="left-panel-image">
            <div class="left-panel-overlay"></div>
            <h1>अन्न-𝙎𝙚𝙩𝙪</h1>
            <p>Bridging surplus food with people, cattle farms and fertilizer centers.</p>
        </div>

        <!-- RIGHT SIDE LOGIN -->
        <div class="right-panel">
            <div class="login-box">
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to your account</p>

                <!-- Divider -->
                <div class="divider">
                    <span>OR CONTINUE WITH</span>
                </div>

                <!-- Google Sign-In Button (Primary) -->
                <a href="http://localhost:5000/api/auth/google" class="google-btn-primary">
                    <svg class="google-icon" viewBox="0 0 24 24" width="24" height="24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z">
                        </path>
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z">
                        </path>
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z">
                        </path>
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z">
                        </path>
                    </svg>
                    Sign in with Google
                </a>

                <!-- Divider between login methods -->
                <div class="divider-small">
                    <span>Don't have Google?</span>
                </div>

                <!-- Keep the regular form below -->
                <form class="email-login">
                    <p class="email-login-label">Login with Email</p>
                    <div class="input-field">
                        <i class="fa fa-envelope"></i>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-field">
                        <i class="fa fa-lock"></i>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="login-btn">Login with Email</button>
                </form>

                <div class="links">
                    <a href="forgot-password.html">Forgot password?</a>
                    <p>
                        Don't have an account?
                        <a href="register.html">Register</a>
                    </p>
                </div>
            </div>
        </div>

    </div>
    <script src="js/login.js"></script>
</body>

</html>
