<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Food | Annasetu</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/addFood.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo">अन्न-𝙎𝙚𝙩𝙪🌾</h2>

            <nav>
                <a href="dashboard.html" class="nav-link"><i class="fa fa-home"></i> Dashboard</a>
                <a href="addfood.html" class="nav-link active"><i class="fa fa-plus-circle"></i> Add Food</a>
                <a href="browse.html" class="nav-link"><i class="fa fa-utensils"></i> Browse Food</a>
                <a href="#" class="nav-link"><i class="fa fa-bell"></i> Notifications</a>
                <a href="#" class="nav-link"><i class="fa fa-user"></i> Profile</a>
                <a href="index.html" class="nav-link logout"
                    onclick="localStorage.removeItem('token');localStorage.removeItem('user');">
                    <i class="fa fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>

        <!-- MAIN -->
        <div class="main-content">

            <div class="header">
                <h2 class="title">Donate Food</h2>
                <button onclick="location.href='dashboard.html'" class="btn">Back</button>
            </div>

            <div class="card">

                <form id="foodForm">

                    <div class="form-grid">

                        <input type="text" id="foodName" placeholder="Food Name" required>
                        <input type="text" id="quantity" placeholder="Quantity" required>

                        <input type="datetime-local" id="cookedTime" required>

                        <select id="foodType" required>
                            <option value="">Food Type</option>
                            <option>Vegetarian</option>
                            <option>Non-Veg</option>
                            <option>Vegan</option>
                        </select>

                    </div>

                    <!-- FULL WIDTH -->
                    <div class="form-grid">

                        <textarea id="description"
                            placeholder="Description... (e.g., Fresh cooked rice, Old moldy bread, Vegetables)"></textarea>
                        <input type="text" id="location" placeholder="Pickup Location" required>

                    </div>

                    <!-- IMAGE -->
                    <div class="upload-box" id="uploadBox">
                        <i class="fa fa-cloud-upload-alt"></i>
                        <p>Upload 2–4 Photos</p>
                        <input type="file" id="imageUpload" multiple accept="image/*">
                    </div>

                    <div id="imageMsg"></div>

                    <div class="preview" id="preview"></div>

                    <!-- AI ANALYSIS BUTTON -->
                    <div style="text-align: center; margin: 20px 0;">
                        <button type="button" id="aiAnalyzeBtn" class="btn-ai">
                            <i class="fa fa-leaf"></i> 🥗 Scan Quality
                        </button>
                        <div id="aiLoading" class="ai-loading" style="display: none;">
                            <div class="spinner"></div>
                            <p>✅ Checking food quality...</p>
                        </div>
                    </div>

                    <!-- AI RESULTS -->
                    <div id="aiResults" class="ai-results" style="display: none;">
                        <h3>🤖 AI Analysis Results</h3>
                        <div id="analyzedItem"
                            style="background: #f0f4ff; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border-left: 4px solid #667eea;">
                        </div>
                        <div class="result-cards">
                            <div class="result-card human">
                                <div class="result-icon">👥</div>
                                <div class="result-content">
                                    <h4>Human Consumption</h4>
                                    <p id="humanResult">-</p>
                                </div>
                            </div>
                            <div class="result-card cattle">
                                <div class="result-icon">🐄</div>
                                <div class="result-content">
                                    <h4>Animal Feed</h4>
                                    <p id="cattleResult">-</p>
                                </div>
                            </div>
                            <div class="result-card fertilizer">
                                <div class="result-icon">🌱</div>
                                <div class="result-content">
                                    <h4>Fertilizer</h4>
                                    <p id="fertilizerResult">-</p>
                                </div>
                            </div>
                        </div>
                        <p class="ai-recommendation" id="aiRecommendation"></p>
                    </div>

                    <button type="submit" class="btn-primary">Donate Food</button>

                </form>

            </div>

        </div>
    </div>

    <script>

        const upload = document.getElementById("imageUpload");
        const preview = document.getElementById("preview");
        const msg = document.getElementById("imageMsg");
        const form = document.getElementById("foodForm");
        const donateBtn = form.querySelector('.btn-primary');

        // shared images array accessible to submit handler
        let imagesData = [];

        document.getElementById("uploadBox").onclick = () => upload.click();
        // Prevent clicks on the native file input from bubbling up to the upload box
        upload.addEventListener('click', (e) => e.stopPropagation());

        // helper to read files as data URLs, returns Promise<string[]>
        const readFilesAsDataURLs = (files) => {
            const readers = Array.from(files).map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.onerror = (e) => reject(e);
                    reader.readAsDataURL(file);
                });
            });
            return Promise.all(readers);
        };

        upload.addEventListener("change", async () => {

            preview.innerHTML = "";
            const files = upload.files;

            imagesData = []; // reset

            if (files.length < 2) {
                msg.innerHTML = "❌ Minimum 2 images required";
                return;
            }

            if (files.length > 4) {
                msg.innerHTML = "❌ Maximum 4 images allowed";
                upload.value = "";
                return;
            }

            msg.innerHTML = "✅ Images selected";

            try {
                // read all files and render previews
                imagesData = await readFilesAsDataURLs(files);
                imagesData.forEach(src => {
                    const img = document.createElement("img");
                    img.src = src;
                    img.classList.add("preview-img");
                    preview.appendChild(img);
                });
            } catch (err) {
                console.error('Failed to read images', err);
                msg.innerHTML = '❌ Failed to read images';
            }

        });

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const files = upload.files;
            if (files.length < 2 || files.length > 4) {
                alert("Upload 2–4 images");
                return;
            }

            // ensure imagesData is populated (in case user submitted before change handler finished)
            if (imagesData.length !== files.length) {
                try {
                    donateBtn.disabled = true;
                    donateBtn.textContent = 'Processing...';
                    imagesData = await readFilesAsDataURLs(files);
                } catch (err) {
                    donateBtn.disabled = false;
                    donateBtn.textContent = 'Donate Food';
                    alert('Failed to read images');
                    return;
                }
            }

            // gather form values
            const foodName = document.getElementById('foodName').value || 'Unnamed';
            const quantity = document.getElementById('quantity').value || '';
            const cookedTime = document.getElementById('cookedTime').value || '';
            const foodType = document.getElementById('foodType').value || '';
            const description = document.getElementById('description').value || '';
            const location = document.getElementById('location').value || '';

            const donation = {
                food: foodName,
                quantity,
                foodType,
                description,
                location,
                cookedTime,
                images: imagesData.slice()
            };

            // Save to database instead of localStorage
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            try {
                donateBtn.disabled = true;
                donateBtn.textContent = 'Saving...';

                const response = await fetch('http://localhost:5000/api/donations/create', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(donation)
                });

                let data;
                try {
                    data = await response.json();
                } catch (parseError) {
                    // Response is not valid JSON - likely HTML error page
                    const text = await response.text();
                    console.error('Invalid JSON response:', text);
                    alert('Server error: Response is not valid JSON.\nPlease check browser console for details.\nStatus: ' + response.status);
                    donateBtn.disabled = false;
                    donateBtn.textContent = 'Donate Food';
                    return;
                }

                console.log('Donation API Response:', data);

                if (response.ok) {
                    alert('✅ Donation saved successfully!');
                    window.location.href = "dashboard.html";
                } else {
                    alert('Error saving donation: ' + (data.message || 'Unknown error'));
                    donateBtn.disabled = false;
                    donateBtn.textContent = 'Donate Food';
                }
            } catch (error) {
                console.error('Error saving donation:', error);
                alert('Error: ' + error.message);
                donateBtn.disabled = false;
                donateBtn.textContent = 'Donate Food';
            }

        });

        // AI ANALYSIS HANDLER
        document.getElementById("aiAnalyzeBtn").addEventListener("click", async (e) => {
            e.preventDefault();

            const description = document.getElementById("description").value.trim();
            const aiBtn = document.getElementById("aiAnalyzeBtn");
            const aiLoading = document.getElementById("aiLoading");
            const aiResults = document.getElementById("aiResults");
            const token = localStorage.getItem('token');

            // Check if description is provided
            if (!description && imagesData.length === 0) {
                alert("Please either:\n1. Write a description of the food, OR\n2. Upload 2-4 images");
                return;
            }

            // Show loading
            aiBtn.disabled = true;
            aiLoading.style.display = "flex";
            aiResults.style.display = "none";

            try {
                let analysisPayload = {};

                // If description provided, use that
                if (description) {
                    console.log("Starting AI analysis with description");
                    analysisPayload.description = description;
                } else {
                    console.log("Starting AI analysis with", imagesData.length, "images");
                    analysisPayload.images = imagesData.slice(0, 2); // Send first 2 images
                }

                // Send to backend for analysis
                const response = await fetch('http://localhost:5000/api/auth/analyze-food', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(analysisPayload)
                });

                const data = await response.json();
                console.log("AI Response:", data);

                if (response.ok && data.analysis) {
                    const analysis = data.analysis;

                    // Show what was analyzed
                    if (description) {
                        document.getElementById("analyzedItem").innerHTML = `<strong>Food Description:</strong> "${description}"`;
                    } else {
                        document.getElementById("analyzedItem").innerHTML = `<strong>Images Analyzed:</strong> ${imagesData.length} images provided`;
                    }

                    // Display results
                    document.getElementById("humanResult").textContent = `${analysis.human}% suitable`;
                    document.getElementById("cattleResult").textContent = `${analysis.cattle}% suitable`;
                    document.getElementById("fertilizerResult").textContent = `${analysis.fertilizer}% suitable`;
                    document.getElementById("aiRecommendation").textContent = analysis.recommendation;

                    aiResults.style.display = "block";
                    console.log("✓ AI analysis complete");
                } else {
                    alert("AI analysis failed: " + (data.message || "Unknown error"));
                }
            } catch (error) {
                console.error("AI Analysis Error:", error);
                alert("Error analyzing: " + error.message);
            } finally {
                aiBtn.disabled = false;
                aiLoading.style.display = "none";
            }
        });

    </script>

</body>

</html>
