<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Food | Annasetu</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/addFood.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2 class="logo">🌾 Annasetu</h2>

            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="addfood.html" class="nav-link active">Add Food</a>
            <a href="#" class="nav-link">Notifications</a>
            <a href="#" class="nav-link">Profile</a>
            <a href="login.html" class="nav-link logout">Logout</a>
        </div>

        <!-- MAIN -->
        <div class="main-content">

            <div class="header">
                <h2 class="title">Donate Food</h2>
                <button onclick="location.href='dashboard.html'" class="btn">Back</button>
            </div>

            <div class="card">

                <form id="foodForm">

                    <div class="form-grid">

                        <input type="text" id="foodName" placeholder="Food Name" required>
                        <input type="text" id="quantity" placeholder="Quantity" required>

                        <input type="datetime-local" id="cookedTime" required>

                        <select id="foodType" required>
                            <option value="">Food Type</option>
                            <option>Vegetarian</option>
                            <option>Non-Veg</option>
                            <option>Vegan</option>
                        </select>

                    </div>

                    <!-- FULL WIDTH -->
                    <div class="form-grid">

                        <textarea id="description" placeholder="Description..."></textarea>
                        <input type="text" id="location" placeholder="Pickup Location" required>

                    </div>

                    <!-- IMAGE -->
                    <div class="upload-box" id="uploadBox">
                        <i class="fa fa-cloud-upload-alt"></i>
                        <p>Upload 2–4 Photos</p>
                        <input type="file" id="imageUpload" multiple accept="image/*">
                    </div>

                    <div id="imageMsg"></div>

                    <div class="preview" id="preview"></div>

                    <button type="submit" class="btn-primary">Donate Food</button>

                </form>

            </div>

        </div>
    </div>

    <script>

        const upload = document.getElementById("imageUpload");
        const preview = document.getElementById("preview");
        const msg = document.getElementById("imageMsg");
        const form = document.getElementById("foodForm");

        document.getElementById("uploadBox").onclick = () => upload.click();

        upload.addEventListener("change", () => {

            preview.innerHTML = "";
            const files = upload.files;

            if (files.length < 2) {
                msg.innerHTML = "❌ Minimum 2 images required";
                return;
            }

            if (files.length > 4) {
                msg.innerHTML = "❌ Maximum 4 images allowed";
                upload.value = "";
                return;
            }

            msg.innerHTML = "✅ Images selected";

            Array.from(files).forEach(file => {

                const reader = new FileReader();

                reader.onload = e => {
                    const img = document.createElement("img");
                    img.src = e.target.result;
                    img.classList.add("preview-img");
                    preview.appendChild(img);
                };

                reader.readAsDataURL(file);

            });

        });

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if (upload.files.length < 2 || upload.files.length > 4) {
                alert("Upload 2–4 images");
                return;
            }

            localStorage.setItem("foodAdded", "true");

            window.location.href = "dashboard.html";

        });

    </script>

</body>

</html>
